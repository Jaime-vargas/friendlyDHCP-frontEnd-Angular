<app-top-bar-component>
  <button nz-button nzType="primary" nzShape="round"
          (click)="modalOpen()">New Network</button>
</app-top-bar-component>
<div class="mainFrame">
  <app-network-form-modal-component [modalVisible]="modalVisible()" [networkToEdit]="networkToEdit()" (modalClose)="modalClose()" (submitSave)="saveNetwork($event)" (submitUpdate)="updateNetwork($event)"></app-network-form-modal-component>
  <app-network-cards-component [networks]="networks()" [loading]="networkCardsLoading()" (edit)="modalOpenToEdit($event)"></app-network-cards-component>
</div>
